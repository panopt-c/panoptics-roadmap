// ─── HELPERS ─────────────────────────────────────────────────────────────────
function pct(d,t){return t?Math.round(d/t*100):0}
function trkProg(tr){const d=tr.items.filter((_,i)=>checked[tr.id+'-'+i]).length;return{d,t:tr.items.length,p:pct(d,tr.items.length)}}
function phsProg(ph){let d=0,t=0;ph.tracks.forEach(tr=>{tr.items.forEach((_,i)=>{t++;if(checked[tr.id+'-'+i])d++})});ph.ms.forEach((_,i)=>{t++;if(checked[ph.id+'-m-'+i])d++});return{d,t,p:pct(d,t)}}
function crtProg(c){const d=c.items.filter((_,i)=>checked[c.id+'-'+i]).length;return{d,t:c.items.length,p:pct(d,c.items.length)}}
function allProg(){let d=0,t=0;PHASES.forEach(p=>{p.tracks.forEach(tr=>{tr.items.forEach((_,i)=>{t++;if(checked[tr.id+'-'+i])d++})});p.ms.forEach((_,i)=>{t++;if(checked[p.id+'-m-'+i])d++})});CERTS.forEach(c=>{c.items.forEach((_,i)=>{t++;if(checked[c.id+'-'+i])d++})});return{d,t,p:pct(d,t)}}
function toggle(k){checked[k]=!checked[k];if(!checked[k])delete checked[k];S.set('progress',checked);render();}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  document.body.setAttribute('data-theme',darkMode?'dark':'light');
  const ov=allProg();

  // Header
  document.getElementById('header').innerHTML=`
    <div class="hdr-top">
      <div>
        <div class="mono hdr-nm">${editingName?`<input id="nameInput" value="${userName}" />`:`<span class="editable" id="editName">${userName}</span>`}<span style="color:var(--txm)">· 18 MONTHS</span></div>
        <h1>PANOPTIC'S<br>ROADMAP</h1>
        <div class="mono sub">v5.0 · ${ov.d}/${ov.t} ITEMS</div>
      </div>
      <div class="btns">
        <button class="btn ${showMethods?'active':''}" id="btnMethod">HOW TO LEARN</button>
        <button class="btn" id="btnTheme">${darkMode?'☀ LIGHT':'◑ DARK'}</button>
        <button class="btn" id="btnReset">RESET</button>
      </div>
    </div>`;

  // Methods
  const mp=document.getElementById('methods-panel');
  mp.className='methods'+(showMethods?' show':'');
  mp.innerHTML=`<div class="mono" style="font-size:.6rem;letter-spacing:.3em;color:var(--red)">COMPOUND LEARNING METHODOLOGY</div>
    <div class="methods-grid">${METH.map(m=>`<div class="method-card"><div class="icon">${m.i}</div><h4>${m.t}</h4><p>${m.d}</p></div>`).join('')}</div>`;

  // Progress
  document.getElementById('progress-box').innerHTML=`
    <div class="progress-top"><span class="mono progress-label">OVERALL</span><span class="mono progress-pct" style="color:${ov.p===100?'#4ade80':'#ff3e3e'}">${ov.p}%</span></div>
    <div class="bar-outer"><div class="bar-inner bar-grad" style="width:${ov.p}%"></div></div>
    <div class="phase-dots">${PHASES.map(p=>{const pp=phsProg(p);return`<div class="phase-dot"><div class="dot" style="background:${p.c};opacity:${pp.p>0?1:.3}"></div><span class="mono">P${p.n} ${pp.p}%</span></div>`}).join('')}</div>`;

  // Tabs
  document.getElementById('tabs-bar').innerHTML=`
    <button class="tab ${currentTab==='phases'?'active':''}" data-tab="phases">PHASES</button>
    <button class="tab ${currentTab==='certs'?'active':''}" data-tab="certs">CERTIFICATIONS</button>
    <div class="tab-fill"></div>`;

  // Content
  const content=document.getElementById('content');
  if(currentTab==='phases'){
    content.innerHTML=PHASES.map(phase=>{
      const pp=phsProg(phase);const isE=expandedId===phase.id;
      return`<div style="margin-bottom:.75rem">
        <div class="phase-hdr ${isE?'expanded':''}" data-expand="${phase.id}" style="${isE?'border-color:'+phase.c+'60':''}">
          <div class="phase-row">
            <div class="phase-left"><span class="mono phase-num" style="color:${phase.c}">${phase.n}</span><div><div class="phase-title">${phase.t}</div><div class="mono phase-meta">${phase.m} · ${phase.h}</div></div></div>
            <div class="phase-right"><div class="bar-outer" style="width:100px;height:5px"><div class="bar-inner" style="width:${pp.p}%;background:${pp.p===100?'#4ade80':phase.c}"></div></div><span class="mono phase-pct" style="color:${pp.p===100?'#4ade80':phase.c}">${pp.p}%</span><span class="arrow ${isE?'open':''}">▾</span></div>
          </div>
        </div>
        ${isE?`<div class="phase-body show"><p class="phase-desc">${phase.d}</p>
          ${phase.tracks.map(track=>{
            const tp=trkProg(track);const s=catColors[track.cat]||catColors.CODE;const res=track.r?RES[track.r]:null;const ro=openRes===track.id;
            return`<div class="track">
              <div class="track-top"><div class="track-tags"><span class="tag mono" style="color:${s.c};border-color:${s.r};background:${s.b}">${track.cat}</span><span class="mono" style="font-size:.5rem;color:var(--txm)">${track.h}</span>${res?`<span class="tag tag-res mono" data-res="${track.id}">${ro?'HIDE':'RESOURCES'}</span>`:''}</div><span class="mono track-pct" style="color:${tp.p===100?'#4ade80':'var(--txd)'}">${tp.d}/${tp.t} · ${tp.p}%</span></div>
              <h3>${track.t}</h3><p class="track-desc">${track.d}</p>
              ${ro&&res?`<div class="res-panel show"><div class="mono res-label">RESOURCES</div>${res.map(r=>`<a class="res-link" href="${r.u}" target="_blank">${r.n} <span style="color:var(--txm);font-size:.6rem">↗</span></a>`).join('')}</div>`:''}
              <div class="bar-outer" style="height:3px;margin-bottom:.75rem"><div class="bar-inner" style="width:${tp.p}%;background:${tp.p===100?'#4ade80':s.c}"></div></div>
              ${track.items.map((item,i)=>{const k=track.id+'-'+i;const ic=!!checked[k];return`<div class="item" data-key="${k}"><div class="checkbox ${ic?'checked':''}" style="${ic?'background:'+s.c+';border:none':''}"><span style="color:${darkMode?'#0a0a0c':'#fff'}">${ic?'✓':''}</span></div><span class="item-text ${ic?'checked':''}">${item}</span></div>`}).join('')}
            </div>`}).join('')}
          <div class="milestones"><div class="mono ms-label">PHASE ${phase.n} EXIT MILESTONES</div>
            ${phase.ms.map((m,i)=>{const k=phase.id+'-m-'+i;const ic=!!checked[k];return`<div class="item ms-item" data-key="${k}"><div class="checkbox ${ic?'checked':''}" style="${ic?'background:#4ade80;border:2px solid #4ade80':''}">${ic?'<span style="color:#0a0a0c">★</span>':''}</div><span class="item-text ${ic?'checked':''}">${m}</span></div>`}).join('')}
          </div>
        </div>`:''}
      </div>`}).join('');
  } else {
    content.innerHTML=`<p style="font-size:.78rem;color:var(--txd);line-height:1.7;margin:.5rem 0 1.25rem">8 certifications sequenced across 18 months. Each timed to land when you have the skills to back it up.</p>
    ${CERTS.map(cert=>{
      const cp=crtProg(cert);const isE=expandedId===cert.id;
      return`<div style="margin-bottom:.75rem">
        <div class="cert-card" data-expand="${cert.id}" style="${isE?'border-color:#ffd23f60':''}">
          <div class="phase-row"><div style="flex:1;min-width:200px"><div class="cert-name">${cert.nm}</div><div class="mono cert-meta">${cert.org} · ${cert.lv} · ${cert.fc}</div><div class="mono cert-phase">${cert.ph} · TARGET: ${cert.tg}</div></div>
          <div class="phase-right"><div class="bar-outer" style="width:80px;height:5px"><div class="bar-inner" style="width:${cp.p}%;background:${cp.p===100?'#4ade80':'#ffd23f'}"></div></div><span class="mono phase-pct" style="color:${cp.p===100?'#4ade80':'#ffd23f'}">${cp.p}%</span><span class="arrow ${isE?'open':''}">▾</span></div></div>
        </div>
        ${isE?`<div class="cert-body show">
          ${cert.rs?`<div class="res-panel show"><div class="mono res-label">STUDY RESOURCES</div>${cert.rs.map(r=>`<a class="res-link" href="${r.u}" target="_blank">${r.n} ↗</a>`).join('')}</div>`:''}
          <div class="bar-outer" style="height:3px;margin-bottom:.75rem"><div class="bar-inner" style="width:${cp.p}%;background:${cp.p===100?'#4ade80':'#ffd23f'}"></div></div>
          ${cert.items.map((item,i)=>{const k=cert.id+'-'+i;const ic=!!checked[k];return`<div class="item" data-key="${k}"><div class="checkbox ${ic?'checked':''}" style="${ic?'background:#ffd23f;border:none':''}"><span style="color:#0a0a0c">${ic?'✓':''}</span></div><span class="item-text ${ic?'checked':''}">${item}</span></div>`}).join('')}
        </div>`:''}
      </div>`}).join('')}`;
  }

  // Bind events
  document.querySelectorAll('[data-key]').forEach(el=>el.onclick=()=>toggle(el.dataset.key));
  document.querySelectorAll('[data-expand]').forEach(el=>el.onclick=()=>{expandedId=expandedId===el.dataset.expand?null:el.dataset.expand;render()});
  document.querySelectorAll('[data-tab]').forEach(el=>el.onclick=()=>{currentTab=el.dataset.tab;expandedId=null;render()});
  document.querySelectorAll('[data-res]').forEach(el=>el.onclick=e=>{e.stopPropagation();openRes=openRes===el.dataset.res?null:el.dataset.res;render()});
  const btnM=document.getElementById('btnMethod');if(btnM)btnM.onclick=()=>{showMethods=!showMethods;render()};
  const btnT=document.getElementById('btnTheme');if(btnT)btnT.onclick=()=>{darkMode=!darkMode;S.set('dark',darkMode);render()};
  const btnR=document.getElementById('btnReset');if(btnR)btnR.onclick=()=>{if(confirm('Reset ALL progress?')){checked={};S.set('progress',{});render()}};
  const editN=document.getElementById('editName');if(editN)editN.onclick=()=>{editingName=true;render();const inp=document.getElementById('nameInput');if(inp){inp.focus();inp.onblur=()=>{userName=inp.value||'YOUR NAME';editingName=false;S.set('username',userName);render()};inp.onkeydown=e=>{if(e.key==='Enter'){userName=inp.value||'YOUR NAME';editingName=false;S.set('username',userName);render()}}}};
}

render();
</script>
